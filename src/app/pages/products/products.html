<div class="min-h-screen bg-linear-to-br from-pink-100 via-purple-100 to-cyan-100 p-8">

  <!-- NAVBAR -->
  <div class="bg-white/70 backdrop-blur-lg rounded-3xl p-5 shadow-lg flex justify-between items-center mb-8">

    <div>
      <h1 class="text-4xl font-extrabold text-pink-500">
        Productos 🛍
      </h1>

      <p class="text-slate-500 mt-1">
        Gestión de productos pastel
      </p>
    </div>

    <button
      (click)="mostrarModal = true"
      class="bg-pink-400 hover:bg-pink-500 transition text-white px-6 py-3 rounded-2xl shadow-lg font-semibold">

      + Agregar Producto
    </button>

  </div>

  <!-- TABLA -->
  <div class="bg-white/70 backdrop-blur-lg rounded-3xl shadow-lg overflow-hidden">

    <table class="w-full">

      <thead class="bg-pink-200 text-pink-700">

        <tr>
          <th class="p-4 text-left">Nombre</th>
          <th class="p-4 text-left">Precio</th>
          <th class="p-4 text-left">Stock</th>
          <th class="p-4 text-left">Estado</th>
        </tr>

      </thead>

      <tbody>

        <tr class="border-b border-pink-100 hover:bg-pink-50 transition">
          <td class="p-4">Laptop Gamer</td>
          <td class="p-4">$20,000</td>
          <td class="p-4">15</td>
          <td class="p-4">
            <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-sm">
              Disponible
            </span>
          </td>
        </tr>

        <tr class="border-b border-pink-100 hover:bg-pink-50 transition">
          <td class="p-4">Mouse RGB</td>
          <td class="p-4">$500</td>
          <td class="p-4">40</td>
          <td class="p-4">
            <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-sm">
              Disponible
            </span>
          </td>
        </tr>

        <tr class="hover:bg-pink-50 transition">
          <td class="p-4">Teclado Mecánico</td>
          <td class="p-4">$1,200</td>
          <td class="p-4">10</td>
          <td class="p-4">
            <span class="bg-yellow-100 text-yellow-600 px-3 py-1 rounded-full text-sm">
              Bajo stock
            </span>
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</div>

<!-- MODAL -->
<div
  *ngIf="mostrarModal"
  class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl relative">

    <!-- BOTON CERRAR -->
    <button
      (click)="mostrarModal = false"
      class="absolute top-4 right-4 text-slate-400 hover:text-red-400 text-2xl">

      ✖
    </button>

    <h2 class="text-3xl font-bold text-pink-500 mb-6">
      Nuevo Producto ✨
    </h2>

    <form class="space-y-5">

      <div>
        <label class="block mb-2 text-slate-600 font-medium">
          Nombre
        </label>

        <input
          type="text"
          class="w-full border border-pink-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-pink-300"
          placeholder="Nombre del producto">
      </div>

      <div>
        <label class="block mb-2 text-slate-600 font-medium">
          Precio
        </label>

        <input
          type="number"
          class="w-full border border-pink-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-pink-300"
          placeholder="$0.00">
      </div>

      <div>
        <label class="block mb-2 text-slate-600 font-medium">
          Stock
        </label>

        <input
          type="number"
          class="w-full border border-pink-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-pink-300"
          placeholder="0">
      </div>

      <button
        type="submit"
        class="w-full bg-linear-to-r from-pink-400 to-purple-400 hover:scale-105 transition text-white py-4 rounded-2xl font-bold shadow-lg">

        Guardar Producto 💖
      </button>

    </form>

  </div>

</div>
