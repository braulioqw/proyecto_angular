<h1>Productos</h1>

<button (click)="mostrarModal = true">
    Agregar producto
</button>

<!-- MODAL -->

<div *ngIf="mostrarModal"
style="
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.5);
display: flex;
justify-content: center;
align-items: center;
">

    <div
    style="
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    ">

        <h2>Nuevo producto</h2>

        <form>

            <label>Nombre</label>
            <input
            type="text"
            style="
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            ">

            <label>Precio</label>
            <input
            type="number"
            style="
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            ">

            <br><br>

            <button type="submit">
                Guardar
            </button>

            <button
            type="button"
            (click)="mostrarModal = false">

                Cerrar

            </button>

        </form>

    </div>

</div>
